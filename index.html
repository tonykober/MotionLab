<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotionLab</title>
<style>
:root{--bg:#0f1219;--card:rgba(25,32,48,0.7);--border:rgba(255,255,255,0.08);--text:#c0cad8;--white:#f0f4f8;--accent:#8b5cf6;--accent2:#6366f1;--gold:#f5a623}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Inter',-apple-system,sans-serif;min-height:100vh;padding:3rem 2rem}
.container{max-width:900px;margin:0 auto}
h1{color:var(--white);font-size:2.6rem;font-weight:800;text-align:center;margin-bottom:.5rem}
.subtitle{text-align:center;color:#6b7a8d;margin-bottom:3rem;font-size:1rem}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;text-decoration:none;transition:all .25s;display:flex;flex-direction:column;gap:.6rem}
.card:hover{border-color:rgba(139,92,246,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(99,102,241,0.1)}
.card .top{display:flex;align-items:center;gap:.5rem}
.card .icon{font-size:1.5rem}
.card .title{color:var(--white);font-size:1.1rem;font-weight:700}
.card .desc{color:#8090a8;font-size:.82rem;line-height:1.5}
.card .tag{display:inline-block;margin-top:.5rem;padding:3px 10px;border-radius:4px;font-size:.75rem;background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}

.add-card{background:transparent;border:2px dashed rgba(255,255,255,0.1);border-radius:12px;padding:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;min-height:120px}
.add-card:hover{border-color:rgba(139,92,246,0.4);background:rgba(139,92,246,0.05)}
.add-card span{color:#6b7a8d;font-size:1.5rem}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-overlay.visible{display:flex}
.modal{background:#1a2030;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:2rem;width:90%;max-width:450px}
.modal h2{color:var(--white);font-size:1.3rem;margin-bottom:1.2rem}
.modal label{display:block;color:#8090a8;font-size:.8rem;margin-bottom:.3rem;margin-top:.8rem}
.modal input,.modal textarea{width:100%;padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:var(--white);font-size:.9rem;font-family:inherit}
.modal textarea{height:60px;resize:vertical}
.modal .btns{display:flex;gap:.8rem;margin-top:1.5rem;justify-content:flex-end}
.modal .btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-cancel{background:rgba(255,255,255,0.08);color:#aaa}
.btn-save{background:var(--accent);color:#fff}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.modal .msg{font-size:.8rem;margin-top:.8rem;color:#f87171}
.modal .msg.ok{color:#4ade80}

.token-section{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.05)}
.token-section summary{color:#6b7a8d;font-size:.8rem;cursor:pointer}

footer{text-align:center;margin-top:4rem;color:#4a5568;font-size:.8rem}
@media(max-width:600px){body{padding:2rem 1rem}.cards{grid-template-columns:1fr}h1{font-size:2rem}}
</style>
</head>
<body>
<div class="container">
<h1>⚡ MotionLab</h1>
<p class="subtitle">AI 動作研究與生產工具集</p>
<div class="cards" id="cardsGrid"></div>
<footer>MotionLab — AI Motion Research & Production</footer>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<h2>新增卡片</h2>
<label>圖示 (Emoji)</label>
<input id="fIcon" placeholder="📄" maxlength="4">
<label>標題</label>
<input id="fTitle" placeholder="頁面名稱">
<label>連結 URL</label>
<input id="fUrl" placeholder="page.html 或 https://...">
<label>描述</label>
<textarea id="fDesc" placeholder="簡短說明"></textarea>
<label>標籤</label>
<input id="fTag" placeholder="分類標籤">
<details class="token-section" style="display:none">
<summary>GitHub Token</summary>
<input id="fToken" type="password" style="margin-top:.5rem">
</details>
<div class="msg" id="msg"></div>
<div class="btns">
<button class="btn btn-cancel" onclick="closeModal()">取消</button>
<button class="btn btn-save" id="saveBtn" onclick="saveCard()">儲存</button>
</div>
</div>
</div>

<script>
const REPO = 'tonykober/MotionLab';
const FILE = 'cards.json';
const BRANCH = 'main';
const TOKEN = ['github_pat_11AUOOSNQ0','GRg4bFQ6nwPI_ElIKca4mF3C','cq96JT0NgOIueNzgWcD3LSfn2v85xd5e','KZV33BA5yi3aceph'].join('');

let cards = [];
let fileSha = '';

async function loadCards() {
  try {
    const res = await fetch(`cards.json?t=${Date.now()}`);
    cards = await res.json();
  } catch(e) { cards = []; }
  render();
}

function render() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = cards.map((c,i) => `
    <div class="card" style="position:relative">
      <a href="${c.url}" style="text-decoration:none;display:flex;flex-direction:column;gap:.6rem;flex:1">
        <div class="top"><span class="icon">${c.icon}</span><span class="title">${c.title}</span></div>
        <span class="desc">${c.desc}</span>
        <span class="tag">${c.tag}</span>
      </a>
      <button onclick="event.preventDefault();event.stopPropagation();deleteCard(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:4px;z-index:2" title="刪除">✕</button>
    </div>
  `).join('') + `<div class="add-card" onclick="openModal()"><span>＋</span></div>`;
}

async function deleteCard(idx) {
  if (!confirm(`確定刪除「${cards[idx].title}」？`)) return;
  const token = TOKEN;
  try {
    const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
      headers: { Authorization: `token ${token}` }
    });
    const getData = await getRes.json();
    fileSha = getData.sha;
    const remoteCards = JSON.parse(decodeURIComponent(escape(atob(getData.content.replace(/\n/g,'')))));

    const titleToDelete = cards[idx].title;
    const newCards = remoteCards.filter(c => c.title !== titleToDelete);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newCards, null, 2) + '\n')));

    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `remove: 刪除卡片「${cards[idx].title}」`, content, sha: fileSha, branch: BRANCH })
    });
    if (!putRes.ok) throw new Error((await putRes.json()).message);

    cards = newCards;
    render();
  } catch(e) { alert('刪除失敗：' + e.message); }
}

function openModal() {
  document.getElementById('fIcon').value = '';
  document.getElementById('fTitle').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fTag').value = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('modal').classList.add('visible');
}
function closeModal() {
  document.getElementById('modal').classList.remove('visible');
  document.getElementById('msg').textContent = '';
}

async function saveCard() {
  const icon = document.getElementById('fIcon').value.trim() || '📄';
  const title = document.getElementById('fTitle').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const tag = document.getElementById('fTag').value.trim() || '頁面';
  const token = TOKEN;
  const msg = document.getElementById('msg');

  if (!title || !url) { msg.textContent = '標題和連結為必填'; msg.className='msg'; return; }
  document.getElementById('saveBtn').disabled = true;
  msg.textContent = '儲存中...'; msg.className = 'msg ok';

  try {
    // Get current file content and SHA from GitHub
    const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
      headers: { Authorization: `token ${token}` }
    });
    const getData = await getRes.json();
    fileSha = getData.sha;
    // Decode current cards from GitHub (source of truth)
    const remoteCards = JSON.parse(decodeURIComponent(escape(atob(getData.content.replace(/\n/g,'')))));

    // Add new card
    const newCards = [...remoteCards, {icon, title, desc, url, tag}];
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newCards, null, 2) + '\n')));

    // Update file
    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `feat: 新增卡片「${title}」`, content, sha: fileSha, branch: BRANCH })
    });

    if (!putRes.ok) throw new Error((await putRes.json()).message);

    msg.textContent = '✅ 已儲存！'; msg.className = 'msg ok';
    cards = newCards;
    render();
    setTimeout(closeModal, 1000);
  } catch(e) {
    msg.textContent = '❌ ' + e.message; msg.className = 'msg';
  }
  document.getElementById('saveBtn').disabled = false;
}

loadCards();
</script>
</body>
</html>
